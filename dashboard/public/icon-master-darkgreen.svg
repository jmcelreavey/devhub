      <stop offset="55%" stop-color="#0f5a3d" />
      <stop offset="100%" stop-color="#0a3a28" />
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9ef7cb" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#2a8e61" stop-opacity="0.95" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
