  <rect width="1024" height="1024" rx="220" fill="url(#bg)" />

  <ellipse cx="512" cy="878" rx="176" ry="40" fill="#0c3a28" opacity="0.55" filter="url(#softShadow)" />

  <g stroke-linejoin="round" stroke-linecap="round">
    <rect x="446" y="140" width="132" height="38" rx="13" fill="url(#cap)" stroke="#c8ffe2" stroke-opacity="0.45" stroke-width="3" />
    <rect x="456" y="170" width="112" height="40" rx="16" fill="#0f2f22" stroke="#c8ffe2" stroke-opacity="0.30" stroke-width="3" />
    <rect x="468" y="204" width="88" height="56" rx="26" fill="#0a241a" stroke="#c8ffe2" stroke-opacity="0.22" stroke-width="3" />

    <path
