<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="DevHub dark green bottle icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a12" />
      <stop offset="100%" stop-color="#05100b" />
    </linearGradient>
    <linearGradient id="glass" x1="35%" y1="0%" x2="65%" y2="100%">
      <stop offset="0%" stop-color="#7ce5b4" stop-opacity="0.60" />
      <stop offset="55%" stop-color="#2a8e61" stop-opacity="0.78" />
      <stop offset="100%" stop-color="#15593e" stop-opacity="0.92" />
