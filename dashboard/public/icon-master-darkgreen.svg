         L562 252
         C562 292 594 314 636 350
         C676 384 692 430 692 496
         L692 634
         C692 742 646 832 578 882
         C554 900 534 908 512 908
         C490 908 470 900 446 882
         C378 832 332 742 332 634
         L332 496
         C332 430 348 384 388 350
